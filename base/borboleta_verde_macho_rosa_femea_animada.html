<h2 class="sr-only">Duas borboletas animadas: macho verde e fêmea rosa, batendo as asas, com controle de velocidade.</h2>
<div id="wrap" style="--dur:0.6s; padding:1rem 0;">
  <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div id="bf-macho" style="width:100%; max-width:260px;"></div>
      <span style="font-size:14px; font-weight:500; color:var(--color-text-primary);">Macho (verde)</span>
      <span style="font-size:12px; color:var(--color-text-secondary); text-align:center;">veias finas · 2 manchas de cheiro</span>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div id="bf-femea" style="width:100%; max-width:260px;"></div>
      <span style="font-size:14px; font-weight:500; color:var(--color-text-primary);">Fêmea (rosa)</span>
      <span style="font-size:12px; color:var(--color-text-secondary); text-align:center;">veias grossas · sem manchas</span>
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:12px; margin:1.5rem auto 0; max-width:420px;">
    <label style="font-size:14px; color:var(--color-text-secondary); white-space:nowrap;"><i class="ti ti-wind" aria-hidden="true" style="vertical-align:-2px;margin-right:4px;"></i>Velocidade</label>
    <input type="range" id="spd" min="0.2" max="1.4" step="0.05" value="0.6" style="flex:1;" aria-label="velocidade das asas" />
    <span id="spd-out" style="font-size:14px; font-weight:500; min-width:70px; text-align:right; color:var(--color-text-primary);">1.7 bps</span>
  </div>
</div>
<script>
(function(){
  function butterfly(sex){
    var fem = sex === "femea";
    var veinW = fem ? 2.4 : 1.1;
    var g1 = fem ? "#F7A8C8" : "#84C93E";
    var g2 = fem ? "#E25B92" : "#3F8417";
    var BORDER = fem ? "#5e1230" : "#143a08";
    var VEIN = fem ? "#7a1f44" : "#1d4a0c";
    var BODY = "#191107";

    var forewing = "M148,108 C160,72 205,52 252,66 C272,73 280,97 267,120 C254,142 210,148 175,140 C160,136 150,124 148,112 Z";
    var hindwing = "M148,134 C172,138 208,150 226,178 C240,200 232,232 204,236 C180,240 158,218 150,188 C147,170 146,150 148,138 Z";

    var veins = [
      "M150,116 C185,100 220,82 248,70",
      "M150,118 C195,108 235,102 266,108",
      "M150,122 C195,122 230,128 252,134",
      "M150,126 C180,134 205,140 224,142",
      "M150,142 C180,150 205,162 222,180",
      "M150,150 C175,164 200,186 214,210",
      "M150,160 C168,182 182,210 192,230",
      "M150,172 C158,192 162,210 160,226"
    ].map(function(d){return '<path d="'+d+'" fill="none" stroke="'+VEIN+'" stroke-width="'+veinW+'" stroke-linecap="round"/>';}).join("");

    var spots = [
      [246,73],[263,92],[265,112],[251,131],[226,141],[201,144],
      [221,181],[229,202],[217,225],[196,233],[171,231]
    ].map(function(p){return '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="2.3" fill="#fff"/>';}).join("");

    var scent = fem ? "" : '<ellipse cx="182" cy="192" rx="6" ry="8" fill="'+BODY+'"/><ellipse cx="182" cy="192" rx="2.6" ry="3.6" fill="#2c4a14"/>';

    var halfWing =
      '<path d="'+forewing+'" fill="url(#og'+sex+')" stroke="'+BORDER+'" stroke-width="6.5" stroke-linejoin="round"/>'+
      '<path d="'+hindwing+'" fill="url(#og'+sex+')" stroke="'+BORDER+'" stroke-width="6.5" stroke-linejoin="round"/>'+
      veins + scent + spots;

    var bodyDots = [
      [146,114],[154,114],[150,123],[146,131],[154,131],
      [150,148],[146,158],[154,158],[150,170],[146,182],[154,182],[150,194]
    ].map(function(p){return '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="1.7" fill="#fff"/>';}).join("");

    return '<svg viewBox="0 0 300 300" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">'+
      '<title>Borboleta '+(fem?"fêmea rosa":"macho verde")+'</title>'+
      '<desc>Borboleta '+(fem?"fêmea rosa, com veias grossas":"macho verde, com veias finas e manchas de cheiro")+', vista de cima, batendo as asas.</desc>'+
      '<defs><linearGradient id="og'+sex+'" x1="0" y1="0" x2="0" y2="1">'+
      '<stop offset="0" stop-color="'+g1+'"/><stop offset="1" stop-color="'+g2+'"/></linearGradient></defs>'+
      '<g class="bfly">'+
        '<g class="wing wing-left"><g transform="translate(300,0) scale(-1,1)">'+halfWing+'</g></g>'+
        '<g class="wing wing-right">'+halfWing+'</g>'+
        '<g class="body">'+
          '<ellipse cx="150" cy="178" rx="6.5" ry="42" fill="'+BODY+'"/>'+
          '<ellipse cx="150" cy="120" rx="11" ry="20" fill="'+BODY+'"/>'+
          '<circle cx="150" cy="96" r="8" fill="'+BODY+'"/>'+
          '<circle cx="146.5" cy="95" r="2.4" fill="#070502"/>'+
          '<circle cx="153.5" cy="95" r="2.4" fill="#070502"/>'+
          '<path d="M147,90 C140,78 136,66 132,57" fill="none" stroke="'+BODY+'" stroke-width="2" stroke-linecap="round"/>'+
          '<path d="M153,90 C160,78 164,66 168,57" fill="none" stroke="'+BODY+'" stroke-width="2" stroke-linecap="round"/>'+
          '<circle cx="131" cy="56" r="3.4" fill="'+BODY+'"/>'+
          '<circle cx="169" cy="56" r="3.4" fill="'+BODY+'"/>'+
          bodyDots+
        '</g>'+
      '</g>'+
    '</svg>';
  }

  var st = document.createElement("style");
  st.textContent =
    ".wing{transform-box:fill-box;animation:flap var(--dur) ease-in-out infinite;}"+
    ".wing-right{transform-origin:left center;}"+
    ".wing-left{transform-origin:right center;}"+
    "@keyframes flap{0%,100%{transform:scaleX(1)}50%{transform:scaleX(0.26)}}"+
    ".bfly{transform-box:fill-box;transform-origin:center;animation:bob calc(var(--dur)*2) ease-in-out infinite;}"+
    "@keyframes bob{0%,100%{transform:translateY(2px)}50%{transform:translateY(-6px)}}";
  document.head.appendChild(st);

  document.getElementById("bf-macho").innerHTML = butterfly("macho");
  document.getElementById("bf-femea").innerHTML = butterfly("femea");

  var wrap = document.getElementById("wrap");
  var spd = document.getElementById("spd");
  var out = document.getElementById("spd-out");
  function upd(){
    var d = parseFloat(spd.value);
    wrap.style.setProperty("--dur", d + "s");
    out.textContent = (1/d).toFixed(1) + " bps";
  }
  spd.addEventListener("input", upd);
  upd();
})();
</script>
