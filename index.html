<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="description" content="NhamNham! A Lagartinha da Turminha — jogo educativo sobre metamorfose" />
    <title>NhamNham! A Lagartinha da Turminha 🐛🦋</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Fredoka', 'Comic Sans MS', sans-serif;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        touch-action: none;
        overscroll-behavior: none;
      }
      #game-container {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #game-container canvas {
        display: block;
        margin: 0 !important;
      }
      #mobile-only {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 32px;
        text-align: center;
        background: linear-gradient(180deg, #E8F9FF 0%, #BDE9F7 100%);
        color: #3B3024;
        font-size: clamp(18px, 5vw, 24px);
        font-weight: 700;
      }
      #mobile-only[hidden] { display: none !important; }
      #mobile-only span { font-size: 56px; }
    </style>
  </head>
  <body>
    <div id="page-back" aria-hidden="true"></div>
    <div id="mobile-only" hidden>
      <span>📱</span>
      <p>NhamNham! só funciona no celular em pé.</p>
      <p style="font-size:0.85em;font-weight:600;opacity:0.85">Abra no telefone ou gire a tela.</p>
    </div>
    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
